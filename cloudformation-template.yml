AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for deploying the TinyNotes application

Parameters:
  VpcId:
    Type: String
    Description: The ID of the VPC where resources will be deployed.

  SubnetIds:
    Type: CommaDelimitedList
    Description: A list of subnet IDs for ECS and RDS.

  DatabaseUsername:
    Type: String
    Description: The username for the RDS database.

  DatabasePassword:
    Type: String
    NoEcho: true
    Description: The password for the RDS database.

Resources:
  TinyNotesCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: TinyNotesCluster

  TinyNotesExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TinyNotesExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:CreateLogGroup
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - s3:GetObject
                Resource: "*"

  TinyNotesLoadBalancerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: elasticloadbalancing.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TinyNotesLoadBalancerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                Resource: "*"

  TinyNotesECSLogGroupPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: TinyNotesECSLogGroupPolicy
      Roles:
        - !Ref TinyNotesExecutionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: "arn:aws:logs:*:*:*"

  TinyNotesEC2TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TinyNotesEC2TaskPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RunTask
                  - ecs:StopTask
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                  - ecs:DescribeContainerInstances
                  - ecs:DescribeClusters
                Resource: "*"

  TinyNotesTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: TinyNotesTask
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TinyNotesExecutionRole.Arn
      ContainerDefinitions:
        - Name: backend
          Image: <backend-docker-image-placeholder>
          PortMappings:
            - ContainerPort: 80
              Protocol: tcp
          Environment:
            - Name: ConnectionStrings__NotesDb
              Value: !Sub "Host=${TinyNotesDatabase.Endpoint.Address};Username=${DatabaseUsername};Password=${DatabasePassword};Database=notes_db"

  TinyNotesLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: TinyNotesLoadBalancer
      Scheme: internet-facing
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !GetAtt TinyNotesLoadBalancerSecurityGroup.GroupId

  TinyNotesLoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for TinyNotes Load Balancer
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  TinyNotesTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: TinyNotesTargetGroup
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip

  TinyNotesListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref TinyNotesLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TinyNotesTargetGroup

  TinyNotesService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref TinyNotesCluster
      TaskDefinition: !Ref TinyNotesTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: 80
          TargetGroupArn: !Ref TinyNotesTargetGroup

  TinyNotesDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.micro
      Engine: postgres
      MasterUsername: !Ref DatabaseUsername
      MasterUserPassword: !Ref DatabasePassword
      AllocatedStorage: 20
      VPCSecurityGroups:
        - !GetAtt TinyNotesDatabaseSecurityGroup.GroupId
      DBSubnetGroupName: !Ref TinyNotesDatabaseSubnetGroup

  TinyNotesDatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for TinyNotes RDS instance
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !GetAtt TinyNotesServiceSecurityGroup.GroupId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  TinyNotesDatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for TinyNotes RDS instance
      SubnetIds: !Ref SubnetIds

  TinyNotesFrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: tiny-notes-frontend
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

  TinyNotesFrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TinyNotesFrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${TinyNotesFrontendBucket}/*"

  TinyNotesS3AccessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TinyNotesS3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub "arn:aws:s3:::${TinyNotesFrontendBucket}/*"

  TinyNotesServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for TinyNotes ECS service
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !GetAtt TinyNotesLoadBalancerSecurityGroup.GroupId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

Outputs:
  FrontendBucketName:
    Description: The name of the S3 bucket hosting the frontend.
    Value: !Ref TinyNotesFrontendBucket

  BackendServiceEndpoint:
    Description: The endpoint of the backend service.
    Value: !Sub "http://${TinyNotesLoadBalancer.DNSName}"

  DatabaseEndpoint:
    Description: The endpoint of the RDS database.
    Value: !GetAtt TinyNotesDatabase.Endpoint.Address